[platformio]
default_envs = esp32-c3-supermini-dev

[env:esp32-c3-supermini-dev]
platform = espressif32
framework = arduino
board = esp32-c3-devkitm-1
monitor_speed = 115200
build_flags =
  -D APP_VERSION=\"0.1.0-dev\"
  -D APP_CHANNEL=\"dev\"
  -D APP_BOARD=\"esp32-c3-supermini\"

[env:native-test]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
  -D APP_VERSION=\"0.1.0-test\"
  -D APP_CHANNEL=\"test\"
  -D APP_BOARD=\"native\"
build_src_filter =
  +<MatrixLayout.cpp>
  +<FrameBuffer.cpp>
  +<network/NetworkPlanner.cpp>
  +<network/WiFiManager.cpp>
  +<settings/AppSettingsPersistence.cpp>
  +<time/*.cpp>
  +<web/NetworkSettingsJson.cpp>
  +<web/StatusJsonBuilder.cpp>
  +<effects/*.cpp>
  -<main.cpp>

